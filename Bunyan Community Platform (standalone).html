  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

32;box-shadow:0 4px 24px rgba(0,48,60,.2)\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 32px;max-width:1280px;margin:0 auto\">\n      <div style=\"display:flex;align-items:center;gap:14px;cursor:pointer\" onclick=\"{{ showPublic }}\">\n        <img src=\"a621fbec-e39f-408d-acf3-261bce883502\" alt=\"هيئة تطوير منطقة المدينة المنورة\" style=\"height:38px;width:auto;display:block\">\n        <div style=\"width:1px;height:28px;background:rgba(255,255,255,.15)\"><\u002Fdiv>\n        <div><div style=\"color:#fff;font-size:17px;font-weight:700;font-family:'Almadinah',sans-serif\">مجتمع بُنيان<\u002Fdiv><div style=\"color:#C4A75E;font-size:10.5px\">ممارسو التنمية الاجتماعية<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:6px;align-items:center\">\n        <sc-for list=\"{{ navLinks }}\" as=\"link\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ link.action }}\" style=\"color:rgba(255,255,255,.72);font-size:13px;font-weight:600;padding:8px 15px;border-radius:20px;border:none;background:transparent;cursor:pointer;font-family:inherit\" style-hover=\"color:#fff;background:rgba(255,255,255,.08)\">{{ link.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n        <button onclick=\"{{ openJoinModal }}\" style=\"background:#8D7632;color:#00303C;padding:9px 20px;border-radius:20px;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:inherit\" style-hover=\"background:#A98D42\">انضم للمجتمع<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ═══════════ PUBLIC VIEW ═══════════ -->\n  <sc-if value=\"{{ isPublic }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"الصفحة الرئيسية\">\n\n    <!-- HERO -->\n    <section style=\"background:linear-gradient(150deg,#00303C 0%,#00453A 55%,#006B5B 100%);position:relative;overflow:hidden;padding:96px 32px 84px;display:flex;align-items:center;min-height:480px\">\n      <div style=\"position:relative;z-index:2;max-width:1280px;margin:0 auto;width:100%\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(141,118,50,.18);border:1px solid rgba(141,118,50,.4);color:#C4A75E;padding:6px 18px;border-radius:20px;font-size:12.5px;font-weight:700;margin-bottom:26px\">مجتمع ممارسي التنمية الاجتماعية<\u002Fdiv>\n        <h1 style=\"font-family:'Almadinah',sans-serif;font-weight:400;font-size:clamp(36px,5vw,58px);line-height:1.35;color:#fff;margin:0 0 14px;max-width:720px\">مجتمع <span style=\"color:#C4A75E\">بُنيان<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:clamp(15px,2vw,18px);color:rgba(255,255,255,.72);max-width:560px;margin:0 0 40px;line-height:1.8\">نحو منظومة مهنية رائدة في التنمية الاجتماعية بمنطقة المدينة المنورة، قائمة على المعرفة وقياس الأثر<\u002Fp>\n        <div style=\"display:inline-flex;align-items:center;gap:22px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:20px 32px\">\n          <strong style=\"font-size:44px;font-weight:900;color:#C4A75E;line-height:1;font-variant-numeric:tabular-nums\">٥<\u002Fstrong>\n          <span style=\"color:rgba(255,255,255,.75);font-size:14px;max-width:140px\">مسارات تنموية متخصصة<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TRACKS -->\n    <section id=\"tracks-anchor\" style=\"background:#fff;padding:80px 32px\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"text-align:center;margin-bottom:48px\">\n          <div style=\"color:#8D7632;font-size:11.5px;font-weight:700;letter-spacing:.1em;margin-bottom:10px\">المسارات التنموية<\u002Fdiv>\n          <h2 style=\"font-family:'Almadinah',sans-serif;font-weight:400;font-size:32px;margin:0 0 14px\">منظومة متكاملة من المسارات المهنية<\u002Fh2>\n          <p style=\"color:#6F7271;font-size:15px;max-width:520px;margin:0 auto\">خمسة مسارات تُغطي دورة العمل التنموي كاملةً من المعرفة إلى قياس الأثر<\u002Fp>\n          <div style=\"width:56px;height:3px;background:linear-gradient(90deg,#006B5B,#8D7632);margin:20px auto 0;border-radius:2px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px\">\n          <sc-for list=\"{{ tracks }}\" as=\"tr\" hint-placeholder-count=\"5\">\n            <div style=\"background:#F5EFE5;border-radius:14px;padding:30px 22px;text-align:center;border:1.5px solid transparent;transition:border-color .15s,transform .15s,box-shadow .15s\" style-hover=\"border-color:#006B5B;box-shadow:0 8px 28px rgba(0,48,60,.1);transform:translateY(-3px)\">\n              <div style=\"width:56px;height:56px;border-radius:14px;background:#006B5B;display:grid;place-items:center;margin:0 auto 18px\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ tr.p1 }}\"><\u002Fpath><path d=\"{{ tr.p2 }}\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"font-size:16px;font-weight:700;margin-bottom:9px\">{{ tr.name }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6F7271;line-height:1.65\">{{ tr.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- INITIATIVES -->\n    <section id=\"initiatives-anchor\" style=\"background:#F5EFE5;padding:80px 32px\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"text-align:center;margin-bottom:48px\">\n          <div style=\"color:#8D7632;font-size:11.5px;font-weight:700;letter-spacing:.1em;margin-bottom:10px\">المبادرات<\u002Fdiv>\n          <h2 style=\"font-family:'Almadinah',sans-serif;font-weight:400;font-size:32px;margin:0 0 14px\">سبع مبادرات تحت مظلة بُنيان<\u002Fh2>\n          <p style=\"color:#6F7271;font-size:15px;max-width:520px;margin:0 auto\">منظومة متكاملة من المبادرات لتحقيق الريادة التنموية الوطنية<\u002Fp>\n          <div style=\"width:56px;height:3px;background:linear-gradient(90deg,#006B5B,#8D7632);margin:20px auto 0;border-radius:2px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px\">\n          <sc-for list=\"{{ initiatives }}\" as=\"ini\" hint-placeholder-count=\"7\">\n            <div style=\"background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 14px rgba(0,48,60,.06);border:1.5px solid transparent;display:flex;gap:16px;transition:border-color .15s,transform .15s\" style-hover=\"border-color:#006B5B;transform:translateY(-2px)\">\n              <div style=\"flex-shrink:0;width:46px;height:46px;border-radius:11px;background:#00303C;display:grid;place-items:center;margin-top:2px\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ ini.p1 }}\"><\u002Fpath><sc-if value=\"{{ ini.p2 }}\"><path d=\"{{ ini.p2 }}\"><\u002Fpath><\u002Fsc-if><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px\">\n                  <div style=\"font-size:15.5px;font-weight:700\">{{ ini.name }}<\u002Fdiv>\n                  <span style=\"flex-shrink:0;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;background:{{ ini.badgeBg }};color:{{ ini.badgeColor }}\">{{ ini.badge }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#6F7271;line-height:1.6\">{{ ini.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- PARTNERS -->\n    <section id=\"partners-anchor\" style=\"background:#fff;padding:80px 32px\">\n      <div style=\"max-width:1000px;margin:0 auto\">\n        <div style=\"text-align:center;margin-bottom:44px\">\n          <div style=\"color:#8D7632;font-size:11.5px;font-weight:700;letter-spacing:.1em;margin-bottom:10px\">الشركاء<\u002Fdiv>\n          <h2 style=\"font-family:'Almadinah',sans-serif;font-weight:400;font-size:32px;margin:0 0 14px\">منظومة شراكات متعددة الأبعاد<\u002Fh2>\n          <p style=\"color:#6F7271;font-size:15px;max-width:520px;margin:0 auto\">شراكات حكومية وأهلية واستراتيجية لتعزيز الأثر والمصداقية المؤسسية<\u002Fp>\n          <div style=\"width:56px;height:3px;background:linear-gradient(90deg,#006B5B,#8D7632);margin:20px auto 0;border-radius:2px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px\">\n          <sc-for list=\"{{ partners }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"background:#F5EFE5;border-radius:10px;padding:26px 18px;text-align:center;border:1px solid rgba(0,107,91,.12);transition:border-color .15s,transform .15s\" style-hover=\"border-color:#006B5B;transform:translateY(-2px)\">\n              <div style=\"width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#006B5B,#00303C);display:grid;place-items:center;margin:0 auto 14px;color:#fff;font-weight:700;font-size:12px;text-align:center;line-height:1.3\">{{ p.short }}<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:600;line-height:1.4\">{{ p.name }}<\u002Fdiv>\n              <div style=\"font-size:10.5px;color:#8D7632;margin-top:5px;font-weight:600\">{{ p.type }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- JOIN -->\n    <section id=\"join-anchor\" style=\"background:linear-gradient(150deg,#00303C,#00453A);padding:76px 32px;text-align:center\">\n      <div style=\"max-width:760px;margin:0 auto\">\n        <div style=\"color:#C4A75E;font-size:11.5px;font-weight:700;letter-spacing:.1em;margin-bottom:10px\">انضم لبُنيان<\u002Fdiv>\n        <h2 style=\"font-family:'Almadinah',sans-serif;font-weight:400;font-size:32px;color:#fff;margin:0 0 14px\">كيف تنضم للمجتمع؟<\u002Fh2>\n        <p style=\"color:rgba(255,255,255,.65);font-size:15px;margin:0 0 40px\">بُنيان مجتمع مفتوح للأفراد والمؤسسات العاملة في التنمية الاجتماعية<\u002Fp>\n        <div style=\"display:flex;gap:22px;justify-content:center;flex-wrap:wrap\">\n          <div onclick=\"{{ openJoinIndividual }}\" style=\"background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:34px 30px;width:250px;cursor:pointer;transition:transform .15s,border-color .15s,background .15s\" style-hover=\"background:rgba(255,255,255,.14);border-color:#8D7632;transform:translateY(-4px)\">\n            <div style=\"width:52px;height:52px;border-radius:12px;background:rgba(0,107,91,.35);border:1.5px solid rgba(0,107,91,.6);display:grid;place-items:center;margin:0 auto 18px\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:18px;font-weight:800;color:#fff;margin-bottom:8px\">فرد<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:rgba(255,255,255,.65);line-height:1.5\">ممارس تنموي، خبير، باحث، أو مستشار في مجال التنمية الاجتماعية<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ openJoinOrg }}\" style=\"background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:34px 30px;width:250px;cursor:pointer;transition:transform .15s,border-color .15s,background .15s\" style-hover=\"background:rgba(255,255,255,.14);border-color:#8D7632;transform:translateY(-4px)\">\n            <div style=\"width:52px;height:52px;border-radius:12px;background:rgba(141,118,50,.35);border:1.5px solid rgba(141,118,50,.6);display:grid;place-items:center;margin:0 auto 18px\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21V8l9-5 9 5v13\"><\u002Fpath><path d=\"M9 21V12h6v9\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:18px;font-weight:800;color:#fff;margin-bottom:8px\">مؤسسة<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:rgba(255,255,255,.65);line-height:1.5\">جمعية أهلية، شركة، جهة حكومية، أو مركز بحثي في القطاع التنموي<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer style=\"background:#00303C;color:rgba(255,255,255,.55);padding:36px 32px;text-align:center;font-size:12.5px;border-top:2px solid #8D7632\">\n      <p style=\"margin:0\">مجتمع <strong style=\"color:#C4A75E\">بُنيان<\u002Fstrong> — الإدارة العامة للتنمية الاجتماعية<\u002Fp>\n      <p style=\"margin:8px 0 0\">هيئة تطوير منطقة المدينة المنورة &nbsp;|&nbsp; جميع الحقوق محفوظة ٢٠٢٦<\u002Fp>\n    <\u002Ffooter>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ JOIN MODAL ═══════════ -->\n  <sc-if value=\"{{ modalOpen }}\">\n  <div onclick=\"{{ handleOverlay }}\" style=\"position:fixed;inset:0;background:rgba(0,20,26,.65);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease\">\n    <div style=\"background:#fff;border-radius:16px;width:100%;max-width:540px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.35);animation:fadeUp .25s ease;max-height:90vh;overflow-y:auto\">\n      <div style=\"background:#00303C;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #8D7632\">\n        <div style=\"color:#fff;font-size:16.5px;font-weight:700\">{{ modalTitle }}<\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;line-height:1;font-family:inherit\" style-hover=\"color:#fff\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:28px\">\n\n        <!-- steps bar -->\n        <div style=\"display:flex;gap:0;margin-bottom:26px\">\n          <sc-for list=\"{{ stepIndicators }}\" as=\"si\" hint-placeholder-count=\"3\">\n            <div style=\"flex:1;text-align:center\">\n              <div style=\"width:28px;height:28px;border-radius:50%;border:2px solid {{ si.borderColor }};background:{{ si.bg }};display:grid;place-items:center;font-size:12px;font-weight:700;color:{{ si.color }};margin:0 auto 6px\">{{ si.icon }}<\u002Fdiv>\n              <div style=\"font-size:10.5px;color:{{ si.labelColor }};font-weight:{{ si.labelWeight }}\">{{ si.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- step 1: type -->\n        <sc-if value=\"{{ isStep1 }}\">\n        <div>\n          <p style=\"font-size:13.5px;color:#6F7271;margin:0 0 20px\">اختر نوع عضويتك في مجتمع بُنيان:<\u002Fp>\n          <div style=\"display:flex;gap:16px\">\n            <div onclick=\"{{ pickIndividual }}\" style=\"flex:1;border:2px solid {{ indBorder }};background:{{ indBg }};border-radius:10px;padding:20px 16px;text-align:center;cursor:pointer;transition:border-color .15s\">\n              <div style=\"width:40px;height:40px;border-radius:10px;background:#DCEAE3;display:grid;place-items:center;margin:0 auto 10px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#006B5B\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:700;margin-bottom:4px\">فرد<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#6F7271;line-height:1.4\">ممارس، خبير، باحث، أو مستشار تنموي<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ pickOrg }}\" style=\"flex:1;border:2px solid {{ orgBorder }};background:{{ orgBg }};border-radius:10px;padding:20px 16px;text-align:center;cursor:pointer;transition:border-color .15s\">\n              <div style=\"width:40px;height:40px;border-radius:10px;background:#F0EAD8;display:grid;place-items:center;margin:0 auto 10px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8D7632\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21V8l9-5 9 5v13\"><\u002Fpath><path d=\"M9 21V12h6v9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:700;margin-bottom:4px\">مؤسسة<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#6F7271;line-height:1.4\">جمعية، شركة، جهة حكومية، أو مركز بحثي<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:22px\">\n            <button onclick=\"{{ goStep2 }}\" disabled=\"{{ noTypeSelected }}\" style=\"width:100%;background:{{ nextBtnBg }};color:#fff;padding:12px;border-radius:8px;font-weight:700;font-size:14.5px;border:none;font-family:inherit;cursor:{{ nextBtnCursor }}\">التالي ←<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 2: individual form -->\n        <sc-if value=\"{{ isStep2Individual }}\">\n        <div>\n          <div style=\"margin-bottom:15px\"><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">الاسم الكامل <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel><input type=\"text\" placeholder=\"اسمك الثلاثي\" style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;color:#00303C;direction:rtl\"><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:15px\">\n            <div><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">التخصص المهني <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel>\n              <select style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl\"><option value=\"\">اختر<\u002Foption><option>تنمية مجتمعية<\u002Foption><option>عمل اجتماعي<\u002Foption><option>تطوير مؤسسي<\u002Foption><option>قياس الأثر<\u002Foption><option>إدارة مشاريع تنموية<\u002Foption><\u002Fselect>\n            <\u002Fdiv>\n            <div><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">سنوات الخبرة <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel>\n              <select style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl\"><option value=\"\">اختر<\u002Foption><option>أقل من سنة<\u002Foption><option>١–٣ سنوات<\u002Foption><option>٣–٧ سنوات<\u002Foption><option>أكثر من ٧ سنوات<\u002Foption><\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px\"><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">المسار المهني المفضل<\u002Flabel>\n            <select style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl\"><option value=\"\">اختر المسار<\u002Foption><option>مسار المعرفة<\u002Foption><option>مسار التطوير المهني<\u002Foption><option>مسار الابتكار التنموي<\u002Foption><option>مسار قياس الأثر<\u002Foption><option>مسار البيانات والإحصاء<\u002Foption><\u002Fselect>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:6px\"><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">البريد الإلكتروني <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel><input type=\"email\" placeholder=\"example@domain.com\" style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:ltr;text-align:right\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;margin-top:22px\">\n            <button onclick=\"{{ goStep1 }}\" style=\"background:#F5EFE5;color:#00303C;padding:11px 18px;border-radius:8px;font-weight:600;font-size:13.5px;border:1.5px solid #D3C7B3;cursor:pointer;font-family:inherit\">→ السابق<\u002Fbutton>\n            <button onclick=\"{{ goStep3 }}\" style=\"flex:1;background:#006B5B;color:#fff;padding:11px;border-radius:8px;font-weight:700;font-size:13.5px;border:none;cursor:pointer;font-family:inherit\">التالي ←<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 2: org form -->\n        <sc-if value=\"{{ isStep2Org }}\">\n        <div>\n          <div style=\"margin-bottom:15px\"><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">اسم الجهة <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel><input type=\"text\" placeholder=\"الاسم الرسمي للجهة\" style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl\"><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:15px\">\n            <div><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">نوع الجهة <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel>\n              <select style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl\"><option value=\"\">اختر<\u002Foption><option>جمعية أهلية<\u002Foption><option>مؤسسة أهلية<\u002Foption><option>جهة حكومية<\u002Foption><option>شركة خاصة<\u002Foption><option>مركز بحثي<\u002Foption><\u002Fselect>\n            <\u002Fdiv>\n            <div><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">المدينة<\u002Flabel>\n              <select style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl\"><option value=\"\">اختر<\u002Foption><option>المدينة المنورة<\u002Foption><option>الرياض<\u002Foption><option>جدة<\u002Foption><option>مكة المكرمة<\u002Foption><\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px\"><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">المجال التنموي الرئيسي <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel>\n            <select style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl\"><option value=\"\">اختر<\u002Foption><option>تنمية مجتمعية<\u002Foption><option>تطوير مؤسسي<\u002Foption><option>رعاية اجتماعية<\u002Foption><option>تمكين الشباب<\u002Foption><option>تمكين المرأة<\u002Foption><\u002Fselect>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px\"><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">البريد الإلكتروني للتواصل <span style=\"color:#A63A2B\">*<\u002Fspan><\u002Flabel><input type=\"email\" placeholder=\"info@org.com\" style=\"width:100%;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:ltr;text-align:right\"><\u002Fdiv>\n          <div style=\"margin-bottom:6px\"><label style=\"display:block;font-size:12.5px;font-weight:700;margin-bottom:6px\">نبذة عن مبادرات الجهة<\u002Flabel><textarea placeholder=\"اذكر أبرز مبادراتكم وبرامجكم التنموية...\" style=\"width:100%;min-height:70px;padding:10px 13px;border:1.5px solid #D3C7B3;border-radius:8px;font-size:13.5px;font-family:inherit;direction:rtl;resize:vertical\"><\u002Ftextarea><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;margin-top:22px\">\n            <button onclick=\"{{ goStep1 }}\" style=\"background:#F5EFE5;color:#00303C;padding:11px 18px;border-radius:8px;font-weight:600;font-size:13.5px;border:1.5px solid #D3C7B3;cursor:pointer;font-family:inherit\">→ السابق<\u002Fbutton>\n            <button onclick=\"{{ goStep3 }}\" style=\"flex:1;background:#006B5B;color:#fff;padding:11px;border-radius:8px;font-weight:700;font-size:13.5px;border:none;cursor:pointer;font-family:inherit\">التالي ←<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 3: confirmation -->\n        <sc-if value=\"{{ isStep3 }}\">\n        <div style=\"text-align:center;padding:14px 0\">\n          <div style=\"width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#006B5B,#8D7632);display:grid;place-items:center;margin:0 auto 20px\">\n            <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:19px;font-weight:800;margin-bottom:9px\">تم استلام طلبك<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#6F7271;line-height:1.65;margin:0 0 18px;max-width:380px;margin-inline:auto\">شكراً لاهتمامك بالانضمام لمجتمع بُنيان. سيتم مراجعة طلبك والتواصل معك خلال أسبوعين عبر البريد الإلكتروني المُدخل.<\u002Fp>\n          <div style=\"background:#F5EFE5;border-radius:8px;padding:13px 18px;font-size:12.5px;color:#6F7271;margin-bottom:20px\">يمكنك الاطلاع على بوابة الأعضاء للتعرف على مزايا العضوية والمسارات المتاحة<\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <button onclick=\"{{ closeModal }}\" style=\"flex:1;background:#F5EFE5;color:#00303C;padding:12px;border-radius:8px;font-weight:600;font-size:13.5px;border:1.5px solid #D3C7B3;cursor:pointer;font-family:inherit\">إغلاق<\u002Fbutton>\n            <button onclick=\"{{ goToPortal }}\" style=\"flex:1;background:#006B5B;color:#fff;padding:12px;border-radius:8px;font-weight:700;font-size:13.5px;border:none;cursor:pointer;font-family:inherit\">استعراض البوابة<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ DASHBOARD ═══════════ -->\n  <sc-if value=\"{{ isPortal }}\">\n  <div data-screen-label=\"بوابة الأعضاء\" style=\"display:flex;min-height:calc(100vh - 63px)\">\n    <nav style=\"width:250px;flex-shrink:0;background:#00303C;padding:20px 0\">\n      <div style=\"margin:0 16px 20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px\">\n        <div style=\"width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0;background:{{ avatarBg }};color:#fff\">{{ avatarInitial }}<\u002Fdiv>\n        <div><div style=\"font-size:13px;font-weight:700;color:#fff\">{{ dashName }}<\u002Fdiv><div style=\"font-size:11px;color:rgba(255,255,255,.5)\">{{ dashType }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:16px 24px 6px;color:rgba(255,255,255,.35);font-size:10.5px;letter-spacing:.08em\">القائمة<\u002Fdiv>\n      <sc-for list=\"{{ navItems }}\" as=\"ni\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ ni.action }}\" style=\"display:flex;align-items:center;gap:11px;padding:10px 24px;color:{{ ni.color }};cursor:pointer;font-size:13.5px;font-weight:600;border-right:3px solid {{ ni.borderColor }};border-top:none;border-bottom:none;border-left:none;background:{{ ni.bg }};width:100%;text-align:right;font-family:inherit\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><path d=\"{{ ni.p1 }}\"><\u002Fpath><sc-if value=\"{{ ni.p2 }}\"><path d=\"{{ ni.p2 }}\"><\u002Fpath><\u002Fsc-if><\u002Fsvg>\n          <span>{{ ni.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n      <div style=\"border-top:1px solid rgba(255,255,255,.07);margin:10px 0\"><\u002Fdiv>\n      <div style=\"padding:16px 24px 6px;color:rgba(255,255,255,.35);font-size:10.5px;letter-spacing:.08em\">النظام<\u002Fdiv>\n      <button onclick=\"{{ showPublic }}\" style=\"display:flex;align-items:center;gap:11px;padding:10px 24px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13.5px;font-weight:600;border:none;background:none;width:100%;text-align:right;font-family:inherit\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4\"><\u002Fpath><path d=\"M16 17l5-5-5-5\"><\u002Fpath><path d=\"M21 12H9\"><\u002Fpath><\u002Fsvg>\n        <span>العودة<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fnav>\n\n    <main style=\"flex:1;padding:32px;background:#F0F2F1;overflow-x:hidden\">\n\n      <!-- HOME -->\n      <sc-if value=\"{{ isTabHome }}\">\n      <div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:12px\">\n          <div><div style=\"font-size:22px;font-weight:800\">لوحة التحكم<\u002Fdiv><div style=\"font-size:13px;color:#6F7271\">مجتمع بُنيان — المرحلة التأسيسية<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#006B5B;color:#fff;padding:7px 16px;border-radius:20px;font-size:12.5px;font-weight:600\">٢٠٢٦<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:26px\">\n          <sc-for list=\"{{ dashKpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 14px rgba(0,48,60,.06);border-top:4px solid {{ k.color }}\">\n              <div style=\"font-size:11px;color:#6F7271;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px\">{{ k.label }}<\u002Fdiv>\n              <div style=\"font-size:29px;font-weight:900;color:{{ k.color }};line-height:1\">{{ k.value }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6F7271;margin-top:4px\">{{ k.unit }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n          <div style=\"background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 14px rgba(0,48,60,.06)\">\n            <div style=\"font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #E7D8C3\">تقدم المسارات<\u002Fdiv>\n            <sc-for list=\"{{ trackProgress }}\" as=\"tp\" hint-placeholder-count=\"5\">\n              <div style=\"margin-bottom:14px\">\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px\"><span style=\"font-weight:600\">{{ tp.name }}<\u002Fspan><span style=\"color:#006B5B;font-weight:700\">{{ tp.phase }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px;background:#E7D8C3;border-radius:3px;overflow:hidden\"><div style=\"height:100%;border-radius:3px;background:linear-gradient(90deg,#006B5B,#8D7632);width:{{ tp.pct }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 14px rgba(0,48,60,.06)\">\n            <div style=\"font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #E7D8C3\">آخر الأنشطة<\u002Fdiv>\n            <sc-for list=\"{{ recentActivity }}\" as=\"a\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #F0EAD8\">\n                <div style=\"width:7px;height:7px;border-radius:50%;background:{{ a.color }};margin-top:7px;flex-shrink:0\"><\u002Fdiv>\n                <div><div style=\"font-size:12.5px;color:#2C3E35;line-height:1.5\">{{ a.text }}<\u002Fdiv><div style=\"font-size:11px;color:#6F7271;margin-top:2px\">{{ a.time }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- TRACKS TAB -->\n      <sc-if value=\"{{ isTabTracks }}\">\n      <div>\n        <div style=\"font-size:22px;font-weight:800;margin-bottom:22px\">مساراتي التنموية<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px\">\n          <sc-for list=\"{{ myTracks }}\" as=\"mt\" hint-placeholder-count=\"5\">\n            <div style=\"background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 14px rgba(0,48,60,.06);border-top:4px solid {{ mt.color }}\">\n              <div style=\"font-size:15px;font-weight:700;margin-bottom:10px;padding-bottom:12px;border-bottom:2px solid #E7D8C3\">{{ mt.name }}<\u002Fdiv>\n              <p style=\"font-size:13px;color:#6F7271;line-height:1.6;margin:0\">{{ mt.desc }}<\u002Fp>\n              <div style=\"margin-top:14px;padding-top:12px;border-top:1px solid #E7D8C3;font-size:12px;font-weight:600;color:{{ mt.color }}\">المرحلة: {{ mt.phase }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- INITIATIVES TAB (org only) -->\n      <sc-if value=\"{{ isTabInit }}\">\n      <div>\n        <div style=\"font-size:22px;font-weight:800;margin-bottom:22px\">مبادرات الجهة<\u002Fdiv>\n        <div style=\"background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 14px rgba(0,48,60,.06);margin-bottom:20px\">\n          <div style=\"font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #E7D8C3\">المبادرات المسجلة<\u002Fdiv>\n          <div style=\"text-align:center;padding:40px 20px;color:#6F7271\">\n            <div style=\"font-size:15px;font-weight:700;color:#00303C;margin-bottom:8px\">لا توجد مبادرات مسجلة بعد<\u002Fdiv>\n            <p style=\"margin:0;font-size:13px\">يمكن للجهة تسجيل مبادراتها التنموية وربطها بمسارات المجتمع بعد اعتماد العضوية.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 14px rgba(0,48,60,.06)\">\n          <div style=\"font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #E7D8C3\">المبادرات المتاحة للشراكة<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px\">\n            <sc-for list=\"{{ openInitiatives }}\" as=\"oi\" hint-placeholder-count=\"3\">\n              <div style=\"background:#F5EFE5;border-radius:10px;padding:17px;border-top:4px solid #006B5B\">\n                <div style=\"font-size:13.5px;font-weight:700;margin-bottom:6px\">{{ oi.name }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#6F7271;line-height:1.5;margin-bottom:11px\">{{ oi.desc }}<\u002Fdiv>\n                <span style=\"background:#DCEAE3;color:#006B5B;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:12px\">مفتوحة للشراكة<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- placeholders -->\n      <sc-if value=\"{{ currentPlaceholder }}\">\n      <div>\n        <div style=\"font-size:22px;font-weight:800;margin-bottom:22px\">{{ currentPlaceholder.title }}<\u002Fdiv>\n        <div style=\"background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 14px rgba(0,48,60,.06)\">\n          <div style=\"font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #E7D8C3\">{{ currentPlaceholder.section }}<\u002Fdiv>\n          <div style=\"text-align:center;padding:52px 20px;color:#6F7271\">\n            <div style=\"width:56px;height:56px;border-radius:14px;background:#F0EAD8;display:grid;place-items:center;margin:0 auto 16px\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8D7632\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ currentPlaceholder.p1 }}\"><\u002Fpath><sc-if value=\"{{ currentPlaceholder.p2 }}\"><path d=\"{{ currentPlaceholder.p2 }}\"><\u002Fpath><\u002Fsc-if><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:700;color:#00303C;margin-bottom:8px\">{{ currentPlaceholder.status }}<\u002Fdiv>\n            <p style=\"margin:0;font-size:13px;max-width:340px;margin-inline:auto;line-height:1.6\">{{ currentPlaceholder.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst TRACKS = [\n  {num:'٠١', name:'مسار المعرفة', desc:'توثيق التجارب التنموية وتراكم المعرفة المؤسسية وتجسير الفجوة المنهجية بين الممارسين', p1:'M4 5.5c2-1 5-1 7 0v13c-2-1-5-1-7 0z', p2:'M20 5.5c-2-1-5-1-7 0v13c2-1 5-1 7 0z'},\n  {num:'٠٢', name:'مسار التطوير المهني', desc:'بناء كفاءات مهنية متخصصة وتطوير أدوات الممارسة التنموية الاحترافية', p1:'M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8z', p2:'M5 21v-1a7 7 0 0 1 14 0v1'},\n  {num:'٠٣', name:'مسار الابتكار التنموي', desc:'رصد التحديات المجتمعية الواقعية وإطلاق تدخلات تنموية مبتكرة قابلة للتطبيق والقياس', p1:'M9 18h6M10 21h4', p2:'M8 11a4 4 0 1 1 8 0c0 2-1.5 3-2 4.5-.2.6-.3 1-.3 1.5H10.3c0-.5-.1-.9-.3-1.5C9.5 14 8 13 8 11z'},\n  {num:'٠٤', name:'مسار قياس الأثر', desc:'تطوير نموذج موحد لقياس الأثر التنموي وإصدار تقارير سنوية دورية بالمنطقة', p1:'M3 20h18', p2:'M6 20V10M12 20V4M18 20v-7'},\n  {num:'٠٥', name:'مسار البيانات والإحصاء', desc:'توظيف البيانات والمؤشرات الإحصائية لفهم الواقع التنموي وتوجيه القرار', p1:'M4 5h6v6H4zM14 5h6v6h-6z', p2:'M4 15h6v6H4zM14 15h6v6h-6z'}\n];\n\nconst INITIATIVES = [\n  {name:'مرصد التنمية الاجتماعية', badge:'جارية', badgeBg:'#DCEAE3', badgeColor:'#006B5B', desc:'منصة معرفية لقياس وتحليل واقع التنمية بالمنطقة وإصدار مؤشرات دورية لصناع القرار', p1:'M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z', p2:'M12 7v5l3 3'},\n  {name:'أكاديمية بُنيان', badge:'قادمة', badgeBg:'#F0EAD8', badgeColor:'#8D7632', desc:'ذراع التدريب والتأهيل الاحترافي للممارسين التنمويين ببرامج معتمدة', p1:'M2 9l10-4 10 4-10 4-10-4z', p2:'M6 11v5c0 1.5 3 3 6 3s6-1.5 6-3v-5'},\n  {name:'مختبر الابتكار الاجتماعي', badge:'قادمة', badgeBg:'#F0EAD8', badgeColor:'#8D7632', desc:'تطوير حلول تنموية مبتكرة للتحديات المجتمعية عبر التفكير التصميمي والنماذج التطبيقية', p1:'M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9l-6-6z', p2:'M14 3v6h6'},\n  {name:'جائزة بُنيان', badge:'قادمة', badgeBg:'#F0EAD8', badgeColor:'#8D7632', desc:'تكريم المبادرات والممارسين المتميزين ورفع سقف الطموح التنموي في المنطقة', p1:'M12 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10z', p2:'M9 12.5 7 21l5-2.5 5 2.5-2-8.5'},\n  {name:'تقرير التنمية السنوي', badge:'جارية', badgeBg:'#DCEAE3', badgeColor:'#006B5B', desc:'مرجع تحليلي سنوي يوثق حالة التنمية المجتمعية بالمنطقة ويُغذّي قرارات التخطيط', p1:'M6 3h9l5 5v13H6z', p2:'M15 3v5h5'},\n  {name:'شبكة خبراء بُنيان', badge:'جارية', badgeBg:'#DCEAE3', badgeColor:'#006B5B', desc:'مجتمع خبراء ومستشارين تنمويين محليين وإقليميين ودوليين للتعاون المعرفي المشترك', p1:'M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z', p2:'M2 20c0-3.3 2.7-6 6-6s6 2.7 6 6M16 5.2A3 3 0 0 1 16 11M20 20c0-2.8-1.8-5.1-4.3-5.8'},\n  {name:'منصة المعرفة التنموية', badge:'جارية', badgeBg:'#DCEAE3', badgeColor:'#006B5B', desc:'مكتبة معرفية تفاعلية تجمع أدوات ومنهجيات وممارسات التنمية الاجتماعية الموثقة', p1:'M4 5.5c2-1 5-1 7 0v13c-2-1-5-1-7 0z', p2:'M20 5.5c-2-1-5-1-7 0v13c2-1 5-1 7 0z'}\n];\n\nconst PARTNERS = [\n  {short:'نسيج', name:'مؤسسة نسيج الأهلية', type:'شريك تنفيذي'},\n  {short:'وزارة', name:'وزارة الموارد البشرية والتنمية الاجتماعية', type:'شريك حكومي'},\n  {short:'NCNP', name:'المركز الوطني لتنمية القطاع غير الربحي', type:'شريك حكومي'}\n];\n\nconst OPEN_INITIATIVES = [\n  {name:'مرصد التنمية الاجتماعية', desc:'انضم كجهة مساهمة في بناء قاعدة بيانات التنمية بالمنطقة'},\n  {name:'تقرير التنمية السنوي', desc:'ساهم ببيانات جهتك في التقرير السنوي للتنمية المجتمعية'},\n  {name:'شبكة خبراء بُنيان', desc:'رشّح خبراء جهتك للانضمام لشبكة الخبراء التنمويين'}\n];\n\nconst TRACK_PROGRESS = [\n  {name:'مسار المعرفة', phase:'التأسيس', pct:'30%'},\n  {name:'مسار التطوير المهني', phase:'التأسيس', pct:'25%'},\n  {name:'مسار الابتكار التنموي', phase:'التخطيط', pct:'15%'},\n  {name:'مسار قياس الأثر', phase:'التخطيط', pct:'10%'},\n  {name:'مسار البيانات والإحصاء', phase:'التأسيس', pct:'20%'}\n];\n\nconst RECENT_ACTIVITY = [\n  {text:'إطلاق مرصد التنمية الاجتماعية', time:'المرحلة الأولى · ٢٠٢٦', color:'#006B5B'},\n  {text:'بناء الهوية المؤسسية لمجتمع بُنيان', time:'جارية', color:'#8D7632'},\n  {text:'إطلاق شبكة خبراء بُنيان', time:'جارية', color:'#006B5B'},\n  {text:'إعداد منصة المعرفة التنموية', time:'جارية', color:'#006B5B'},\n  {text:'استقطاب الأعضاء التأسيسيين', time:'قادم — المرحلة الثانية', color:'#6F7271'}\n];\n\nconst MY_TRACKS = [\n  {name:'مسار المعرفة', desc:'توثيق التجارب وتراكم المعرفة المؤسسية وتجسير الفجوة المنهجية بين الممارسين.', phase:'التأسيس', color:'#006B5B'},\n  {name:'مسار التطوير المهني', desc:'بناء كفاءات مهنية متخصصة وتطوير أدوات الممارسة التنموية الاحترافية.', phase:'التأسيس', color:'#8D7632'},\n  {name:'مسار الابتكار التنموي', desc:'رصد التحديات المجتمعية وإطلاق تدخلات تنموية مبتكرة قابلة للقياس.', phase:'التخطيط', color:'#00416B'},\n  {name:'مسار قياس الأثر', desc:'تطوير نموذج موحد لقياس الأثر التنموي وإصدار تقارير سنوية دورية.', phase:'التخطيط', color:'#3A7D5C'},\n  {name:'مسار البيانات والإحصاء', desc:'توظيف البيانات والمؤشرات لفهم الواقع التنموي وتوجيه قرارات التدخل.', phase:'التأسيس', color:'#6F7271'}\n];\n\nconst ICONS = {\n  home:{p1:'M4 11.5 12 5l8 6.5', p2:'M6 10v8h5v-5h2v5h5v-8'},\n  tracks:{p1:'M4 4h16v4H4zM4 10h16v4H4zM4 16h16v4H4z', p2:''},\n  init:{p1:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z', p2:'M14 2v6h6'},\n  book:{p1:'M4 5.5c2-1 5-1 7 0v13c-2-1-5-1-7 0z', p2:'M20 5.5c-2-1-5-1-7 0v13c2-1 5-1 7 0z'},\n  cal:{p1:'M4 6h16v14H4zM4 10h16', p2:'M8 3v5M16 3v5'},\n  net:{p1:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2', p2:'M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z'}\n};\n\nconst SECTION_TITLES = {\n  home:'لوحة التحكم', tracks:'مساراتي التنموية', init:'مبادرات الجهة',\n  know:'مستودع المعرفة', events:'الفعاليات والجلسات', net:'شبكة التواصل المهني'\n};\n\nconst PLACEHOLDERS = {\n  know:{title:'مستودع المعرفة', section:'المحتوى المعرفي الحصري', status:'قيد الإعداد', desc:'يتم بناء مستودع المعرفة وتنظيم المحتوى. سيكون متاحاً في المرحلة الثانية.', p1:'M4 5.5c2-1 5-1 7 0v13c-2-1-5-1-7 0z', p2:'M20 5.5c-2-1-5-1-7 0v13c2-1 5-1 7 0z'},\n  events:{title:'الفعاليات والجلسات', section:'الفعاليات القادمة', status:'جاري الإعداد', desc:'يتم تجهيز جدول الفعاليات والجلسات التأسيسية الأولى للمجتمع.', p1:'M4 6h16v14H4zM4 10h16', p2:'M8 3v5M16 3v5'},\n  net:{title:'شبكة التواصل المهني', section:'الأعضاء والخبراء', status:'مرحلة الاستقطاب', desc:'يتم استقطاب الأعضاء التأسيسيين. ستُفعَّل الشبكة بعد اكتمال الدفعة الأولى.', p1:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2', p2:'M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z'}\n};\n\nclass Component extends DCLogic {\n  state = {\n    view: 'public',\n    modalOpen: false,\n    step: 1,\n    selectedType: null,\n    memberType: null,\n    tab: 'home'\n  };\n\n  scrollTo(id) {\n    const el = document.getElementById(id);\n    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n  }\n\n  openModal(preType) {\n    this.setState({ modalOpen: true, step: 1, selectedType: preType || null });\n  }\n  closeModal() { this.setState({ modalOpen: false }); }\n  handleOverlay(e) { if (e.target === e.currentTarget) this.closeModal(); }\n\n  dashKpisFor(type) {\n    const isOrg = type === 'org';\n    return isOrg ? [\n      { label: 'المسارات النشطة', value: '٥', unit: 'مسار تنموي', color: '#006B5B' },\n      { label: 'المبادرات المتاحة', value: '٧', unit: 'للمشاركة', color: '#8D7632' },\n      { label: 'شراكات مفتوحة', value: '٣', unit: 'فرصة شراكة', color: '#00416B' },\n      { label: 'الشركاء', value: '٥', unit: 'جهة شريكة', color: '#3A7D5C' }\n    ] : [\n      { label: 'المسارات النشطة', value: '٥', unit: 'مسار تنموي', color: '#006B5B' },\n      { label: 'المبادرات', value: '٧', unit: 'تحت مظلة بُنيان', color: '#8D7632' },\n      { label: 'الجارية حالياً', value: '٤', unit: 'مبادرة نشطة', color: '#00416B' },\n      { label: 'شبكة الخبراء', value: '—', unit: 'متاحة قريباً', color: '#6F7271' }\n    ];\n  }\n\n  renderVals() {\n    const s = this.state;\n    const isOrg = s.memberType === 'org';\n    const tab = s.tab;\n    const placeholder = PLACEHOLDERS[tab];\n\n    const navItemBase = (key, label, icon) => {\n      const active = key === tab;\n      return {\n        label, p1: icon.p1, p2: icon.p2 || '',\n        color: active ? '#fff' : 'rgba(255,255,255,.65)',\n        bg: active ? 'rgba(255,255,255,.08)' : 'transparent',\n        borderColor: active ? '#8D7632' : 'transparent',\n        action: () => this.setState({ tab: key })\n      };\n    };\n\n    let navItems = [\n      navItemBase('home', 'الرئيسية', ICONS.home),\n      navItemBase('tracks', 'مساراتي', ICONS.tracks)\n    ];\n    if (isOrg) navItems.push(navItemBase('init', 'مبادراتي', ICONS.init));\n    navItems.push(\n      navItemBase('know', 'المعرفة', ICONS.book),\n      navItemBase('events', 'الفعاليات', ICONS.cal),\n      navItemBase('net', 'الشبكة', ICONS.net)\n    );\n\n    return {\n      isPublic: s.view === 'public',\n      isPortal: s.view === 'portal',\n      showPublic: () => this.setState({ view: 'public', modalOpen: false }),\n      navLinks: [\n        { label: 'المسارات', action: () => { this.setState({ view: 'public' }); setTimeout(() => this.scrollTo('tracks-anchor'), 50); } },\n        { label: 'المبادرات', action: () => { this.setState({ view: 'public' }); setTimeout(() => this.scrollTo('initiatives-anchor'), 50); } },\n        { label: 'الشركاء', action: () => { this.setState({ view: 'public' }); setTimeout(() => this.scrollTo('partners-anchor'), 50); } }\n      ],\n      tracks: TRACKS,\n      initiatives: INITIATIVES,\n      partners: PARTNERS,\n      openJoinModal: () => this.openModal(),\n      openJoinIndividual: () => this.openModal('ind'),\n      openJoinOrg: () => this.openModal('org'),\n\n      modalOpen: s.modalOpen,\n      modalTitle: s.step === 1 ? 'الانضمام لمجتمع بُنيان' : s.step === 2 ? (s.selectedType === 'org' ? 'تسجيل مؤسسة' : 'تسجيل فرد') : 'تأكيد الطلب',\n      closeModal: () => this.closeModal(),\n      handleOverlay: (e) => this.handleOverlay(e),\n\n      stepIndicators: [1, 2, 3].map(n => {\n        const done = n < s.step, active = n === s.step;\n        return {\n          icon: done ? '✓' : String(n).replace(/1/g,'١').replace(/2/g,'٢').replace(/3/g,'٣'),\n          borderColor: (done || active) ? '#006B5B' : '#E7D8C3',\n          bg: (done || active) ? '#006B5B' : '#fff',\n          color: (done || active) ? '#fff' : '#6F7271',\n          label: n === 1 ? 'نوع العضوية' : n === 2 ? 'البيانات' : 'التأكيد',\n          labelColor: active ? '#006B5B' : '#6F7271',\n          labelWeight: active ? '700' : '400'\n        };\n      }),\n\n      isStep1: s.step === 1,\n      isStep2Individual: s.step === 2 && s.selectedType !== 'org',\n      isStep2Org: s.step === 2 && s.selectedType === 'org',\n      isStep3: s.step === 3,\n\n      indBorder: s.selectedType === 'ind' ? '#006B5B' : '#E7D8C3',\n      indBg: s.selectedType === 'ind' ? 'rgba(0,107,91,.06)' : '#fff',\n      orgBorder: s.selectedType === 'org' ? '#006B5B' : '#E7D8C3',\n      orgBg: s.selectedType === 'org' ? 'rgba(0,107,91,.06)' : '#fff',\n      pickIndividual: () => this.setState({ selectedType: 'ind' }),\n      pickOrg: () => this.setState({ selectedType: 'org' }),\n      noTypeSelected: !s.selectedType,\n      nextBtnBg: s.selectedType ? '#006B5B' : '#D3C7B3',\n      nextBtnCursor: s.selectedType ? 'pointer' : 'not-allowed',\n      goStep1: () => this.setState({ step: 1 }),\n      goStep2: () => { if (s.selectedType) this.setState({ step: 2 }); },\n      goStep3: () => this.setState({ step: 3, memberType: s.selectedType }),\n      goToPortal: () => this.setState({ modalOpen: false, view: 'portal', tab: 'home' }),\n\n      avatarBg: isOrg ? '#8D7632' : '#006B5B',\n      avatarInitial: isOrg ? 'م' : 'ف',\n      dashName: isOrg ? 'جهة بُنيان' : 'عضو بُنيان',\n      dashType: isOrg ? 'مؤسسة' : 'فرد',\n      navItems,\n\n      isTabHome: tab === 'home',\n      isTabTracks: tab === 'tracks',\n      isTabInit: tab === 'init',\n      currentPlaceholder: placeholder || null,\n\n      dashKpis: this.dashKpisFor(s.memberType),\n      trackProgress: TRACK_PROGRESS,\n      recentActivity: RECENT_ACTIVITY,\n      myTracks: MY_TRACKS,\n      openInitiatives: OPEN_INITIATIVES\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
